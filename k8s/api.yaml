apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-dashboard
  labels:
    app: api-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-dashboard
  template:
    metadata:
      labels:
        app: api-dashboard
    spec:
      containers:
      - name: api-dashboard
        image: jobharvestor-api:latest # Assuming the user builds an image for it, or reuses the producer image with a new command
        imagePullPolicy: Never
        command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8080"]
        env:
        - name: DB_HOST
          value: "postgres"
        - name: REDIS_HOST
          value: "redis"
        - name: DB_PASSWORD
          value: "your_postgres_password"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-dashboard
spec:
  type: NodePort
  selector:
    app: api-dashboard
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
